function resizeImage(file, maxWidth, callback) {
  var reader = new FileReader();
  reader.readAsDataURL(file);
  reader.onload = function(event) {
    var img = new Image();
    img.src = event.target.result;
    img.onload = function() {
      var canvas = document.createElement('canvas');
      var width = img.width;
      var height = img.height;
      if (width > maxWidth) {
        height *= maxWidth / width;
        width = maxWidth;
      }
      canvas.width = width;
      canvas.height = height;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      var dataUrl = canvas.toDataURL('image/jpeg', 0.7);
      callback(dataUrl);
    };
  };
}

function saveMarkerToFirebase(latlng, category, text, name, ownInfo, webLink, photoData) {
  if (webLink && !webLink.startsWith('http://') && !webLink.startsWith('https://')) {
    webLink = 'https://' + webLink;
  }
  const newMarkerRef = database.ref('markers').push();
  newMarkerRef.set({
    lat: latlng.lat,
    lng: latlng.lng,
    category: category,
    text: text,
    name: name,
    ownInfo: ownInfo,
    webLink: webLink || "",
    photo: photoData,
    selected: true,
    timestamp: firebase.database.ServerValue.TIMESTAMP
  });
  document.getElementById("photoInput").value = "";
}
